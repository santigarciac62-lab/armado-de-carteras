name: Deploy static export to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues pisándose si se dispara más de una vez seguida.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build export estático
        run: npm run build
        env:
          STATIC_EXPORT: "true"
          # Debe coincidir con el nombre del repositorio (GitHub Pages sirve
          # los proyectos bajo /<repo>/ salvo que uses un dominio propio).
          NEXT_PUBLIC_BASE_PATH: /armado-de-carteras

      - name: Marcar como no-Jekyll
        run: touch out/.nojekyll

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
